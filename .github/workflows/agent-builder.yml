name: SecuriMon Agent Builder & Open-Source Signer

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GO111MODULE: "on"
  CGO_ENABLED: "0"
  NODE_ENV: "production"
  AWS_REGION: "us-east-1"

permissions:
  contents: write
  actions: read
  checks: write
  security-events: write

jobs:
  analyze-changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.changes.outputs.agent_needs_build }}
      backend: ${{ steps.changes.outputs.backend_needs_build }}
      frontend: ${{ steps.changes.outputs.frontend_needs_build }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Determine Changed Files
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger - building all components"
            echo "agent_needs_build=true" >> $GITHUB_OUTPUT
            echo "backend_needs_build=true" >> $GITHUB_OUTPUT
            echo "frontend_needs_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Analyzing PR changes..."
            changed_files=$(git diff --name-only HEAD ${{ github.event.pull_request.head.sha }})
          else
            echo "Analyzing push changes..."
            changed_files=$(git diff --name-only HEAD~1 HEAD)
          fi
          
          echo "Changed files:"
          echo "$changed_files"
          
          agent_changes="false"
          backend_changes="false"
          frontend_changes="false"
          
          for file in $changed_files; do
            if [[ $file == agent/* ]]; then
              agent_changes="true"
            elif [[ $file == backend/* ]]; then
              backend_changes="true"
            elif [[ $file == frontend/* ]]; then
              frontend_changes="true"
            elif [[ $file == .github/* ]]; then
              agent_changes="true"
              backend_changes="true"
              frontend_changes="true"
            fi
          done
          
          echo "agent_needs_build=$agent_changes" >> $GITHUB_OUTPUT
          echo "backend_needs_build=$backend_changes" >> $GITHUB_OUTPUT
          echo "frontend_needs_build=$frontend_changes" >> $GITHUB_OUTPUT

  build-agent-linux-musl:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            target: x86_64
            goarch: amd64
          - arch: arm64
            target: arm64
            goarch: arm64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: agent/go.sum
      
      - name: Install Musl Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu
      
      - name: Create Build Directory
        run: |
          mkdir -p artifacts/linux/${{ matrix.arch }}
      
      - name: Build Linux Musl Static Binary
        run: |
          cd agent
          export CC=musl-gcc
          export CXX=musl-g++
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.goarch }}
          
          echo "Building Linux ${{ matrix.arch }} static binary..."
          go build -trimpath -ldflags="-w -s -extldflags=-static" -o "../artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}"
          
          echo "Checking binary type..."
          file "../artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" | grep -E "static|shared" || echo "Checking..."
      
      - name: Validate Binary
        run: |
          FILE_TYPE=$(file "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" | cut -d: -f2 | tr -d ' \n')
          echo "Binary type: $FILE_TYPE"
          
          if [[ "$FILE_TYPE" == *"ELF"* ]]; then
            echo "Valid ELF executable"
          else
            echo "Invalid ELF executable"
            exit 1
          fi
          
          EXE_ARCH=$(file "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" | grep -o '([^)]*)' | tr -d '()')
          echo "Detected architecture: $EXE_ARCH"
          
          if [[ "$EXE_ARCH" == *"x86-64"* ]] || [[ "$EXE_ARCH" == *"AMD64"* ]]; then
            if [[ "${{ matrix.arch }}" == "amd64" ]]; then
              echo "Architecture matches target"
            else
              echo "Architecture mismatch"
              exit 1
            fi
          elif [[ "$EXE_ARCH" == *"ARM"* ]] || [[ "$EXE_ARCH" == *"aarch64"* ]]; then
            if [[ "${{ matrix.arch }}" == "arm64" ]]; then
              echo "Architecture matches target"
            else
              echo "Architecture mismatch"
              exit 1
            fi
          fi
      
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Linux Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Arch: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "Target: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "Binary: securimon_${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          
          BINARY_SIZE=$(stat -c%s "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" 2>/dev/null || echo 0)
          BINARY_MB=$(echo "scale=2; $BINARY_SIZE / 1024 / 1024" | bc)
          echo "Binary size: $BINARY_MB MB" >> $GITHUB_STEP_SUMMARY

  build-agent-windows-musl:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.agent == 'true'
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, x86]
        include:
          - arch: x86_64
            target: x86_64
            goarch: amd64
          - arch: x86
            target: i686
            goarch: 386
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: agent/go.sum
      
      - name: Build Windows Binary
        working-directory: agent
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "${{ matrix.goarch }}"
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags="-w -s" -o "../securimon_${{ matrix.target }}.exe"
      
      - name: Move Binary to Artifacts
        run: |
          New-Item -Path "artifacts\windows\${{ matrix.arch }}" -ItemType Directory -Force
          Copy-Item "securimon_${{ matrix.target }}.exe" "artifacts\windows\${{ matrix.arch }}\securimon_${{ matrix.target }}.exe"
      
      - name: Validate Binary
        run: |
          if (Test-Path "artifacts\windows\${{ matrix.arch }}\securimon_${{ matrix.target }}.exe") {
            $binarySize = (Get-Item "artifacts\windows\${{ matrix.arch }}\securimon_${{ matrix.target }}.exe").Length
            $binaryMB = [math]::Round($binarySize / 1MB, 2)
            Write-Host "Valid PE executable - Binary size: $binaryMB MB"
          } else {
            Write-Host "Binary not found"
            exit 1
          }
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: artifacts/windows/${{ matrix.arch }}/securimon_${{ matrix.target }}.exe
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Windows Build Report" >> $env:GITHUB_STEP_SUMMARY
          echo "Arch: ${{ matrix.arch }}" >> $env:GITHUB_STEP_SUMMARY
          echo "Target: ${{ matrix.target }}" >> $env:GITHUB_STEP_SUMMARY
          echo "Binary: securimon_${{ matrix.target }}.exe" >> $env:GITHUB_STEP_SUMMARY
          
          $binarySize = (Get-Item "artifacts\windows\${{ matrix.arch }}\securimon_${{ matrix.target }}.exe").Length
          $binaryMB = [math]::Round($binarySize / 1MB, 2)
          echo "Binary size: $binaryMB MB" >> $env:GITHUB_STEP_SUMMARY

  build-backend:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install Dependencies
        run: npm ci --prefer-offline
      
      - name: Build Application
        run: npm run build
      
      - name: Security Scan
        run: npm audit --audit-level moderate || true
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend/dist/
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Backend Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "Build status: SUCCESS" >> $GITHUB_STEP_SUMMARY

  build-frontend:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Dependencies
        run: npm ci --prefer-offline
      
      - name: Lint Code
        run: npm run lint
      
      - name: Build Application
        run: npm run build
      
      - name: Security Scan
        run: npm audit --audit-level moderate || true
      
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: frontend/.next/
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Frontend Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "Build status: SUCCESS" >> $GITHUB_STEP_SUMMARY

  summary:
    needs: [build-agent-linux-musl, build-agent-windows-musl, build-backend, build-frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: downloaded-artifacts
          merge-multiple: true
      
      - name: Generate Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la downloaded-artifacts/ >> $GITHUB_STEP_SUMMARY || echo "No artifacts downloaded"

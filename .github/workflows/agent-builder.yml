name: SecuriMon Agent Builder & Open-Source Signer

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GO111MODULE: "on"
  CGO_ENABLED: "0"
  NODE_ENV: "production"
  AWS_REGION: "us-east-1"

permissions:
  contents: write
  actions: read
  checks: write
  security-events: write

jobs:
  analyze-changes:
    runs-on: ubuntu-latest
    outputs:
      agent: ${{ steps.changes.outputs.agent_needs_build }}
      backend: ${{ steps.changes.outputs.backend_needs_build }}
      frontend: ${{ steps.changes.outputs.frontend_needs_build }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Determine Changed Files
        id: changes
        run: |
          changed_files="$(git diff --name-only HEAD ${{ github.event.pull_request.head.sha || 'HEAD' }})${
            if ${{ github.event_name == 'pull_request' }}; then
              echo "Analyzing PR changes..."
            else
              echo "Analyzing push changes..."
            fi
          }
          
          agent_changes="false"
          backend_changes="false"
          frontend_changes="false"
          
          for file in $changed_files; do
            if [[ $file == agent/* ]] || [[ $file == pkg.go ]]; then
              agent_changes="true"
            elif [[ $file == backend/* ]] || [[ $file == src/* ]]; then
              backend_changes="true"
            elif [[ $file == frontend/* ]] || [[ $file == src/* ]]; then
              frontend_changes="true"
            fi
          done
          
          echo "agent_needs_build=$agent_changes" >> $GITHUB_OUTPUT
          echo "backend_needs_build=$backend_changes" >> $GITHUB_OUTPUT
          echo "frontend_needs_build=$frontend_changes" >> $GITHUB_OUTPUT

  build-agent-linux-musl:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.agent == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            target: x86_64
            goarch: amd64
          - arch: arm64
            target: arm64
            goarch: arm64
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
      
      - name: Install Musl Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu
      
      - name: Create Build Directory
        run: |
          mkdir -p artifacts/linux/${{ matrix.arch }}
      
      - name: Build Linux Musl Static Binary
        run: |
          export CC=musl-gcc
          export CXX=musl-g++
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=${{ matrix.target }}
          
          echo "Building Linux ${{ matrix.arch }} static binary..."
          go build -trimpath -ldflags="-w -s -extldflags=-static" -o "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}"
          
          echo "Checking binary type..."
          file "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" | grep -E "static|shared" || echo "Checking..."
      
      - name: Validate Binary
        run: |
          FILE_TYPE=$(file "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" | cut -d: -f2 | tr -d ' \n')
          echo "Binary type: $FILE_TYPE"
          
          if [[ "$FILE_TYPE" == *"ELF"* ]]; then
            echo "✓ Valid ELF executable"
          else
            echo "✗ Invalid ELF executable"
            exit 1
          fi
          
          EXE_ARCH=$(file "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" | grep -o '([^)]*)' | tr -d '()')
          echo "Detected architecture: $EXE_ARCH"
          
          if [[ "$EXE_ARCH" == *"x86-64"* ]] || [[ "$EXE_ARCH" == *"AMD64"* ]]; then
            if [[ "${{ matrix.arch }}" == "amd64" ]]; then
              echo "✓ Architecture matches target"
            else
              echo "✗ Architecture mismatch"
              exit 1
            fi
          elif [[ "$EXE_ARCH" == *"ARM"* ]] || [[ "$EXE_ARCH" == *"aarch64"* ]]; then
            if [[ "${{ matrix.arch }}" == "arm64" ]]; then
              echo "✓ Architecture matches target"
            else
              echo "✗ Architecture mismatch"
              exit 1
            fi
          fi
      
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: artifacts/linux/${{ matrix.arch }}/
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Linux Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Arch: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "Target: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "Binary: securimon_${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          
          BINARY_SIZE=$(stat -c%s "artifacts/linux/${{ matrix.arch }}/securimon_${{ matrix.target }}" 2>/dev/null || echo 0)
          BINARY_MB=$(echo "scale=2; $BINARY_SIZE / 1024 / 1024" | bc)
          echo "Binary size: $BINARY_MB MB" >> $GITHUB_STEP_SUMMARY

  build-agent-windows-musl:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.agent == 'true'
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64, x86]
        include:
          - arch: x86_64
            target: x86_64
            goarch: amd64
          - arch: x86
            target: i686
            goarch: 386
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'
          cache: true
      
      - name: Build Windows Binary
        run: |
          go build -trimpath -ldflags="-w -s" -o "securimon_${{ matrix.target }}.exe"
          
          New-Item -Path "artifacts\windows\${{ matrix.arch }}" -ItemType Directory -Force
          
          Copy-Item "securimon_${{ matrix.target }}.exe" "artifacts\windows\${{ matrix.arch }}\securimon_${{ matrix.target }}.exe"
      
      - name: Validate Binary
        run: |
          $fileType = Get-Content "securimon_${{ matrix.target }}.exe" -Encoding Byte | Where-Object { $_ -ge 0x4E -and $_ -le 0x5E } | Select-Object -First 1
          $peSignature = "PE\x00\x00"
          
          if ($fileType -eq $peSignature) {
            Write-Host "✓ Valid PE executable"
          } else {
            Write-Host "✗ Invalid PE executable"
            exit 1
          }
          
          $binarySize = (Get-Item "securimon_${{ matrix.target }}.exe").Length
          $binaryMB = [math]::Round($binarySize / 1MB, 2)
          Write-Host "Binary size: $binaryMB MB"
      
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: artifacts/windows/${{ matrix.arch }}/
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Windows Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Arch: ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "Target: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "Binary: securimon_${{ matrix.target }}.exe" >> $GITHUB_STEP_SUMMARY
          
          $binarySize = (Get-Item "securimon_${{ matrix.target }}.exe").Length
          $binaryMB = [math]::Round($binarySize / 1MB, 2)
          echo "Binary size: $binaryMB MB" >> $GITHUB_STEP_SUMMARY

  build-backend:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci --prefer-offline
      
      - name: Lint Code
        run: npm run lint
      
      - name: Type Check
        run: npm run typecheck
      
      - name: Run Unit Tests
        run: npm test -- --coverage --testPathPattern="src/"
      
      - name: Build Application
        run: npm run build
      
      - name: Security Scan
        run: |
          npm audit --audit-level moderate || true
          npx audit-ci --moderate
      
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: dist/
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Backend Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "Build status: SUCCESS" >> $GITHUB_STEP_SUMMARY

  build-frontend:
    needs: analyze-changes
    if: needs.analyze-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci --prefer-offline
      
      - name: Lint Code
        run: npm run lint
      
      - name: Type Check
        run: npm run typecheck
      
      - name: Run Unit Tests
        run: npm test -- --coverage --testPathPattern="src/"
      
      - name: Build Application
        run: npm run build
      
      - name: Security Scan
        run: |
          npm audit --audit-level moderate || true
          npx audit-ci --moderate
      
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: dist/
          retention-days: 7
      
      - name: Generate Build Report
        if: github.event_name != 'pull_request'
        run: |
          echo "## Frontend Build Report" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "Build status: SUCCESS" >> $GITHUB_STEP_SUMMARY

  composite-test:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Download Backend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend-dist/
      
      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: frontend-dist/
      
      - name: Setup Test Environment
        run: |
          ls -la backend-dist/
          ls -la frontend-dist/
          
          if [ ! -f "backend-dist/index.html" ]; then
            echo "Backend artifact missing!"
            exit 1
          fi
          
          if [ ! -f "frontend-dist/index.html" ]; then
            echo "Frontend artifact missing!"
            exit 1
          fi
          
          echo "✓ All artifacts present"
      
      - name: Run Integration Tests
        run: |
          echo "Running integration tests..."
          npm install
          npm run test:integration
      
      - name: Integration Test Complete
        run: echo "Integration tests completed"

  generate-manifest:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*/**'
          path: 'downloaded-artifacts'
          merge-multiple: true
      
      - name: Generate Manifest
        run: |
          cat > manifest.json << EOF
          {
            "build_id": "${{ github.run_id }}-${{ github.run_number }}",
            "version": "$(git describe --tags --always --dirty 2>/dev/null || echo 'v0.0.0')",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "git_commit": "${{ github.sha }}",
            "git_branch": "${{ github.ref_name }}",
            "artifacts": [
              $(find downloaded-artifacts -type f -name "*.exe" | jq -R . | jq -s '.' | sed '$ d')
            ],
            "status": "success"
          }
          EOF
          
          cat manifest.json
      
      - name: Upload Manifest
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: manifest.json
          retention-days: 7

  validate-builds:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*/**'
          path: downloaded-artifacts
          merge-multiple: true
      
      - name: Check for Required Files
        run: |
          echo "=== Checking Required Files ==="
          
          if [ -f "downloaded-artifacts/backend/index.html" ]; then
            echo "✓ Backend index.html found"
          else
            echo "✗ Backend index.html not found"
            exit 1
          fi
          
          if [ -f "downloaded-artifacts/frontend/index.html" ]; then
            echo "✓ Frontend index.html found"
          else
            echo "✗ Frontend index.html not found"
            exit 1
          fi
      
      - name: Validate Distribution
        run: |
          echo "=== Distributing Artifacts ==="
          echo "Checking artifact counts..."
          
          BACKEND_COUNT=$(find downloaded-artifacts -path "*/backend/*" -type f 2>/dev/null | wc -l)
          FRONTEND_COUNT=$(find downloaded-artifacts -path "*/frontend/*" -type f 2>/dev/null | wc -l)
          
          echo "Backend artifacts: $BACKEND_COUNT"
          echo "Frontend artifacts: $FRONTEND_COUNT"
          echo "Total artifacts: $((BACKEND_COUNT + FRONTEND_COUNT))"
          
          if [ $BACKEND_COUNT -gt 0 ] && [ $FRONTEND_COUNT -gt 0 ]; then
            echo "✓ All artifacts distributed correctly"
          else
            echo "✗ Artifact distribution incomplete"
            exit 1
          fi

  summary:
    needs: [validate-builds, generate-manifest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*/**'
          path: downloaded-artifacts
          merge-multiple: true
      
      - name: Generate Comprehensive Summary
        run: |
          echo "## 🛠️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- Build ID: ${{ github.run_id }}-${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Git Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Git Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifact Distribution" >> $GITHUB_STEP_SUMMARY
          
          BACKEND_FILES=$(find downloaded-artifacts -path "*/backend/*" -type f 2>/dev/null | wc -l)
          FRONTEND_FILES=$(find downloaded-artifacts -path "*/frontend/*" -type f 2>/dev/null | wc -l)
          LINUX_FILES=$(find downloaded-artifacts -name "linux-*" -type f 2>/dev/null | wc -l)
          WINDOWS_FILES=$(find downloaded-artifacts -name "windows-*" -type f 2>/dev/null | wc -l)
          
          echo "- Backend artifacts: $BACKEND_FILES" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend artifacts: $FRONTEND_FILES" >> $GITHUB_STEP_SUMMARY
          echo "- Linux binaries: $LINUX_FILES" >> $GITHUB_STEP_SUMMARY
          echo "- Windows binaries: $WINDOWS_FILES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo ":white_check_mark: All build stages completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "🎉 Build process complete!" >> $GITHUB_STEP_SUMMARY
